<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Timeout Example in JavaScript</title>
</head>
<body>
    <p id="output">Waiting for the timeout...</p>
    <script>
        setTimeout(mytimeoutFunction, 5000);

        function mytimeoutFunction() {
            document.getElementById("output").innerHTML = "Timeout completed!";
        }
    </script>
</body>
</html>
