<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Class in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        class Car {
            constructor(brand, model, year) {
                this.brand = brand;
                this.model = model;
                this.year = year;
            }

            displayInfo() {
                return `Car: ${this.brand} ${this.model}, Year: ${this.year}`;
            }
        }

        const myCar = new Car("Toyota", "Corolla", 2020);
        document.getElementById("demo").innerHTML = myCar.displayInfo();
    </script>
</body>
</html>
