<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Parameter in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function sum(...numbers) {
            let total = 0;
            for (let num of numbers) {
                total += num;
            }
            return total;
        }

        document.getElementById("demo").innerHTML = sum(11, 2, 30);
    </script>
</body>
</html>
