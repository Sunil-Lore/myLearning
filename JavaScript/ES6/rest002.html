<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixing rest and normal parameters in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>    
        function myFunction(a, b, ...manyMoreArgs) {
            document.getElementById("demo").innerHTML = "a = " + a + "<br>b = " + b + "<br>manyMoreArgs = " + manyMoreArgs;
        }
        
        myFunction("one", "two", "three", "four", "five", "six");   
    </script>
</body>
</html>
