<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converting a JSON Text to a JavaScript Object</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        const myJSON = '{"name":"John", "age":30, "city":"New York"}';
        const myObj = JSON.parse(myJSON);
        for(let key in myObj) {
          document.getElementById("demo").innerHTML += key + ": " + myObj[key] + "<br>";
        }
    </script>
</body>
</html>
