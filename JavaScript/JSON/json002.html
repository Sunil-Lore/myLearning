<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converting a JSON Text to a JavaScript Object</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        let text = '{ "employees" : [' +
        '{ "firstName":"John" , "lastName":"Doe" },' +
        '{ "firstName":"Anna" , "lastName":"Smith" },' +
        '{ "firstName":"Peter" , "lastName":"Jones" } ]}';
        const myObj = JSON.parse(text);
        for (let i in myObj.employees) {
          document.getElementById("demo").innerHTML +=
          "First Name: " + myObj.employees[i].firstName + ", " +
          "Last Name: " + myObj.employees[i].lastName + "<br>";
        }

    </script>
</body>
</html>
