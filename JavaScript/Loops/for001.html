<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple FOR loop in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        for (let i = 1; i <= 5; i++) {
            document.getElementById("demo").innerHTML += i + "<br>";
        }
    </script>
</body>
</html>
