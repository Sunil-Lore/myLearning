<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR...IN Loop in Javascript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        const person = {
            name: "John",
            age: 30,
            city: "New York"
        };

        for (let key in person) {
            document.getElementById("demo").innerHTML += key + ": " + person[key] + "<br>"; 
        }
    </script>
</body>
</html>
