<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR...IN Loop in nested objects</title>
</head>
<body>
    <script>
        let car = {
            make: "Toyota",
            model: "Camry",
            year: 2020,
            features: {
                color: "Red",
                transmission: "Automatic",
                sunroof: true
            }
        };

        for (let key in car.features){
            console.log(key + ": " + car.features[key]);
        }            
    </script>
</body>
</html>
