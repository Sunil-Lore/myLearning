<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple FOR...OF Loop in JavaScript</title>
</head>
<body>
    <script>
        // Example of a simple FOR...OF loop in JavaScript
        const fruits = ['Apple', 'Banana', 'Cherry', 'Date'];

        for (const fruit of fruits) {
            console.log(fruit);
        }
    </script>
</body>
</html>
