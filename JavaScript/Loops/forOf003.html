<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR...OF Loop in JavaScript using an Array</title>
</head>
<body>
    <script>
        const numbers = [11, 20, 32, 47, 56];

        for (const number of numbers) {
            console.log(number);
        }
    </script>
</body>
</html>
