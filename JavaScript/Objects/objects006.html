<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR...IN Loop to iterate in JavaScript Object</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        const person = {
            firstName: "John",
            lastName: "Doe",
            age: 30,
            city: "New York"
        };

        let text = "";
        for (let key in person) {
            text += key + ": " + person[key] + "<br>";
        }

        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
