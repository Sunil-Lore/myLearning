<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Checking if a Property Exists in JS object </title>
</head>
<body>
    <script>
        let obj = { model: "Tesla" };
        
        console.log("color" in obj);
        console.log(obj.hasOwnProperty("model"));
    </script>
</body>
</html>
