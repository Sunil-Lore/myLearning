<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recognizing a JavaScript Object</title>
</head>
<body>
    <p id="demo"></p>
    <script> 
        let obj = { name: "Sourav" };
        document.getElementById("demo").innerHTML = 
        typeof obj === "object" && obj !== null ? "This is an object" : "This is not an object";
    </script>
</body>
</html>
