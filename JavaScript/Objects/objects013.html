<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>See the property name in JavaScript Object using for...in</title>
</head>
<body>
    <script>
        const person = { name: "David", number: 12345 };
        for (let key in person) {
        console.log(key); 
        // "name"
        // "number"
        }

    </script>
</body>
</html>
