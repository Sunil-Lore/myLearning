<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Order Functions in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function lowerOrder() {
            document.getElementById("demo").innerText = "Hello, World!";
        }
        function higherOrder(anyFunction) {
            anyFunction();
            anyFunction();
        }

        higherOrder(lowerOrder);
    </script>
</body>
</html>
