<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessing global and local variables in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        let gVar = 10; // global variable

        function accessVar(){
            let lVar = 20; // local variable
            document.getElementById("demo").innerHTML
            = "Global Variable: " + gVar + "<br>" +
            "Local Variable: " + lVar;
        }

        accessVar();
    </script>
</body>
</html>
