<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Scope in JavaScript</title>
</head>
<body>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
        function accessVar(){
            let lVar = 20; // local variable
            document.getElementById("demo1").innerHTML
            = "Local Variable: " + lVar;
        }
        accessVar();
                document.getElementById("demo2").innerHTML = lVar; // This will throw an error because lVar is not defined in this scope
    </script>
</body>
</html>
