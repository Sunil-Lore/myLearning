<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Scope in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function accessVar(){
            let lVar = 20; // local variable
            document.getElementById("demo").innerHTML
            = "Local Variable: " + lVar;
        }

        accessVar();
    </script>
</body>
</html>
