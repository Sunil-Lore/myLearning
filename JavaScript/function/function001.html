<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Hello World Function</title>
</head>
<body>
    <p id="greeting"></p>
    <script>
        // Define a simple function that returns a greeting message
        function sayHello() {
            return "Hello, World!";
        }

        // Call the function and display the result in the paragraph element
        document.getElementById("greeting").innerText = sayHello();
    </script>
</body>
</html>
