<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Function with parameters</title>
</head>
<body>
    <p id="result"></p>
    <script> 
        // Define a function that takes two parameters and returns their sum
        function addNumbers(a, b) {
            return a + b;
        }

        // Call the function with two numbers and display the result in the paragraph element
        document.getElementById("result").innerText = "The sum of 5 and 10 is: " + addNumbers(5, 10);   
    </script>
</body>
</html>
