<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function with local variables</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function myFunction() {
           let carName = "Volvo"; // local variable
            document.getElementById("demo").innerHTML = carName;
        }
        myFunction();
        </script>
</body>
</html>
