<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arguments can be variables</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function myFunction(x, y) {
            return x + y;
        }
        let a = 5;
        let b = 10;
        document.getElementById("demo").innerHTML = myFunction(a, b);
    </script>
</body>
</html>
