<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Functions in JavaScript</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        const greet = function() {
            return "Hello World!";
        };
        document.getElementById("demo").innerHTML = greet();
    </script>
</body>
</html>
